name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    # Build natively on macOS: pkg cross-compiling the macOS targets from a Linux runner has
    # produced corrupted snapshots ("Cannot find module '/snapshot/dist/cli.cjs'") - building
    # on macOS avoids that, and it's the only host that can codesign the macOS binaries.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Verify tag matches package.json version
        # package.json is the version source of truth (bumped by hand before tagging) - the
        # build embeds it into the binary (`cmt --version`, `cmt update`'s up-to-date check), so
        # a tag/package.json mismatch would ship a binary that misreports its own version.
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION - bump package.json first." >&2
            exit 1
          fi

      - name: Compile cross-platform binaries
        run: npm run compile

      - name: Ad-hoc codesign macOS binaries
        run: |
          codesign --force --sign - dist/bin/commit-planner-macos-arm64
          codesign --force --sign - dist/bin/commit-planner-macos-x64

      - name: Compress release assets
        # The embedded Node.js runtime dominates each binary's size (~45-55MB) and gzip/zip
        # shrink that by ~60-70% - install.sh/install.ps1 decompress after downloading, using
        # only tools guaranteed present on each OS (gzip on macOS/Linux, Expand-Archive on
        # Windows), so this doesn't add an install-time dependency.
        run: |
          cd dist/bin
          for f in commit-planner-macos-arm64 commit-planner-macos-x64 commit-planner-linux-x64; do
            gzip -9 -k "$f"
          done
          zip -9 commit-planner-win-x64.exe.zip commit-planner-win-x64.exe
          rm commit-planner-macos-arm64 commit-planner-macos-x64 commit-planner-linux-x64 commit-planner-win-x64.exe

      - name: Publish release with binaries
        uses: softprops/action-gh-release@v2
        with:
          files: dist/bin/*
          generate_release_notes: true

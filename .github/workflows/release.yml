name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Compile cross-platform binaries
        run: npm run compile

      - name: Publish release with binaries
        uses: softprops/action-gh-release@v2
        with:
          files: dist/bin/*
          generate_release_notes: true
